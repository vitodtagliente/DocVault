<!DOCTYPE html>
<html lang="it" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: asset: https://asset.localhost" />
  <title>DocVault</title>
  <link rel="stylesheet" href="css/output.css" />
  <link rel="stylesheet" href="fontawesome/css/all.min.css" />
</head>
<body class="h-full bg-[var(--color-bg)] text-[var(--color-text)] font-sans antialiased">

  <!-- App Shell -->
  <div id="app" class="flex h-full">
    <!-- Sidebar (desktop) -->
    <aside id="sidebar" class="hidden lg:flex lg:flex-col w-60 shrink-0 border-r border-[var(--color-border)] bg-[var(--color-surface)]">
    </aside>

    <!-- Main area -->
    <div class="flex flex-col flex-1 min-w-0 overflow-hidden">
      <!-- Header (mobile) -->
      <header id="header" class="lg:hidden flex items-center justify-between px-4 py-3 border-b border-[var(--color-border)] bg-[var(--color-surface)]">
      </header>

      <!-- Page content -->
      <main id="app-content" class="flex-1 overflow-y-auto p-4 lg:p-6">
        <!-- Pages rendered here -->
        <div class="flex items-center justify-center h-full">
          <div class="text-center">
            <div class="w-12 h-12 border-4 border-[var(--color-primary)] border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-[var(--color-text-muted)]">Caricamento…</p>
          </div>
        </div>
      </main>

      <!-- Bottom Nav (mobile) -->
      <nav id="bottom-nav" class="lg:hidden border-t border-[var(--color-border)] bg-[var(--color-surface)]">
      </nav>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="fixed bottom-20 lg:bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <!-- Modal container -->
  <div id="modal-container"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
